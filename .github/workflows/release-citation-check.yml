name: Release citation check

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  citation-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Check CITATION.cff
        run: python3 tools/check_citation.py

      - name: Run tests
        run: python3 -m pytest tools/tests/test_citation_release.py -v
