name: Wayback snapshot

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      limit:
        description: 'Max URLs to snapshot'
        required: false
        default: '8'
      sleep:
        description: 'Seconds between submissions'
        required: false
        default: '2'

permissions:
  contents: read

jobs:
  wayback:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r tools/requirements.txt

      - name: Dry-run snapshot list
        run: python3 tools/wayback_snapshot.py --dry-run --limit ${{ github.event.inputs.limit || '8' }}

      - name: Submit to Wayback Machine
        run: |
          python3 tools/wayback_snapshot.py \
            --submit \
            --limit ${{ github.event.inputs.limit || '8' }} \
            --sleep ${{ github.event.inputs.sleep || '2' }}
