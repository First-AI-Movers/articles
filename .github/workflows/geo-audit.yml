name: GEO audit

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  geo-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r tools/requirements.txt

      - name: Run GEO audit
        run: python3 tools/geo_audit.py

      - name: Upload GEO audit reports
        uses: actions/upload-artifact@v4
        with:
          name: geo-audit-reports
          path: |
            geo_audit_report.json
            geo_audit_report.md
