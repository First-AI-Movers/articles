name: Build & deploy

on:
  push:
    branches: [main]
    paths:
      - 'articles/**'
      - 'tools/**'
      - 'templates/**'
      - 'static/**'
      - 'hernanicosta.json'
      - 'ABOUT.md'
      - 'CITATION.cff'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r tools/requirements.txt

      - name: Normalize tags to canonical topics
        run: python3 tools/normalize_tags.py

      - name: Rebuild index, sitemap, feed, corpus, docs, and static site
        env:
          INDEXNOW_API_KEY_ARTICLES_FAIM: ${{ secrets.INDEXNOW_API_KEY_ARTICLES_FAIM }}
        run: python3 tools/rebuild_local.py

      - name: Commit regenerated artifacts if changed
        run: |
          # Only watch the derived artifacts we commit. site/ is gitignored.
          if git status --porcelain articles/*/metadata.json index.json sitemap.xml feed.xml llms-full.txt llms-recent.txt README.md llms.txt | grep -q .; then
            git config user.name "Index Bot"
            git config user.email "info@firstaimovers.com"
            git add articles/*/metadata.json
            git add index.json sitemap.xml feed.xml llms-full.txt llms-recent.txt README.md llms.txt
            git commit -m "Rebuild derived artifacts"
            git push
          else
            echo "No derived artifacts changed."
          fi

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

  indexnow:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: IndexNow dry-run
        env:
          INDEXNOW_API_KEY_ARTICLES_FAIM: ${{ secrets.INDEXNOW_API_KEY_ARTICLES_FAIM }}
        run: python3 tools/submit_indexnow.py --dry-run
