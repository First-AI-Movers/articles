name: MCP Server

on:
  pull_request:
    paths:
      - 'mcp-server/**'
      - 'tools/export_mcp_data.py'
      - '.github/workflows/mcp-server.yml'
  push:
    branches: [main]
    paths:
      - 'mcp-server/**'
      - 'tools/export_mcp_data.py'
      - '.github/workflows/mcp-server.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp-server
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: mcp-server/package-lock.json

      - name: Install Node dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Build (dry-run)
        run: npm run build

  export-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          pip install pyarrow pytest

      - name: Run export data tests
        run: python3 -m pytest tools/tests/test_export_mcp_data.py -v

      - name: Verify generated data is up to date
        run: |
          python3 tools/export_mcp_data.py --check

  deploy:
    needs: [test, export-data]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    defaults:
      run:
        working-directory: mcp-server
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: mcp-server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Deploy to Cloudflare Workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          MCP_DEPLOY_ENABLED: ${{ vars.MCP_DEPLOY_ENABLED }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "Skipping deployment: Cloudflare credentials not configured"
            exit 0
          fi
          if [ "$MCP_DEPLOY_ENABLED" != "1" ] && [ "$MCP_DEPLOY_ENABLED" != "true" ]; then
            echo "Skipping deployment: MCP_DEPLOY_ENABLED is not set"
            exit 0
          fi
          npm run deploy
