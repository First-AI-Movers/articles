name: Ingest articles from Airtable

on:
  workflow_dispatch:
  schedule:
    - cron: "17 6 * * *"

permissions:
  contents: write
  pull-requests: write

env:
  INGEST_DRY_RUN: ${{ vars.INGEST_DRY_RUN || '1' }}
  # Production safety bounds for the daily cron.
  # INGEST_MAX_RECORDS caps how many records the script PAGES from Airtable
  # in one run. INGEST_MAX_CREATED caps how many article folders the script
  # actually CREATES in one run. Skips/dedupes/invalids do not count.
  # Defaults are conservative; tune via repo variables once steady-state.
  INGEST_MAX_RECORDS: ${{ vars.INGEST_MAX_RECORDS || '20' }}
  INGEST_MAX_CREATED: ${{ vars.INGEST_MAX_CREATED || '5' }}

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r tools/requirements.txt
          pip install pytest

      - name: Ingest from Airtable (dry-run)
        if: env.INGEST_DRY_RUN == '1'
        env:
          AIRTABLE_PAT: ${{ secrets.AIRTABLE_PAT }}
          AIRTABLE_BASE_ID: ${{ secrets.AIRTABLE_BASE_ID }}
          AIRTABLE_TABLE_NAME: ${{ secrets.AIRTABLE_TABLE_NAME }}
          AIRTABLE_VIEW_NAME: ${{ secrets.AIRTABLE_VIEW_NAME }}
        run: |
          python3 tools/ingest_airtable.py \
            --dry-run \
            --since-hours 72 \
            --limit "${INGEST_MAX_RECORDS}" \
            --max-created "${INGEST_MAX_CREATED}" \
            --allow-no-status-gate

      - name: Ingest from Airtable (write)
        if: env.INGEST_DRY_RUN != '1'
        env:
          AIRTABLE_PAT: ${{ secrets.AIRTABLE_PAT }}
          AIRTABLE_BASE_ID: ${{ secrets.AIRTABLE_BASE_ID }}
          AIRTABLE_TABLE_NAME: ${{ secrets.AIRTABLE_TABLE_NAME }}
          AIRTABLE_VIEW_NAME: ${{ secrets.AIRTABLE_VIEW_NAME }}
        run: |
          python3 tools/ingest_airtable.py \
            --write \
            --since-hours 72 \
            --limit "${INGEST_MAX_RECORDS}" \
            --max-created "${INGEST_MAX_CREATED}"

      - name: Normalize tags to canonical topics
        if: env.INGEST_DRY_RUN != '1'
        run: python3 tools/normalize_tags.py

      - name: Check for duplicate article titles
        if: env.INGEST_DRY_RUN != '1'
        run: python3 tools/check_duplicate_titles.py

      - name: Rebuild index, sitemap, feed, corpus, docs, and static site
        if: env.INGEST_DRY_RUN != '1'
        env:
          INDEXNOW_API_KEY_ARTICLES_FAIM: ${{ secrets.INDEXNOW_API_KEY_ARTICLES_FAIM }}
        run: python3 tools/rebuild_local.py

      - name: Patch ROADMAP operational-state marker
        # rebuild_local.py only patches README.md and llms.txt; ROADMAP.md's
        # auto:operational-state block is patched by update_docs.py. Without
        # this step, test_check_mode_exits_zero_when_unchanged would fail
        # whenever ingestion changes the article count.
        if: env.INGEST_DRY_RUN != '1'
        run: python3 tools/update_docs.py

      - name: Run pytest
        if: env.INGEST_DRY_RUN != '1'
        run: python3 -m pytest tools/tests -v

      - name: Open PR for new articles
        if: env.INGEST_DRY_RUN != '1'
        uses: peter-evans/create-pull-request@v6
        with:
          # Prefer ARTICLE_INGESTION_PR_TOKEN so PR-create triggers downstream
          # CI; GitHub suppresses workflow runs on PRs created with the default
          # GITHUB_TOKEN to prevent recursion. Falls back to GITHUB_TOKEN when
          # the PAT is not provisioned (PR will need close/reopen for CI).
          token: ${{ secrets.ARTICLE_INGESTION_PR_TOKEN || secrets.GITHUB_TOKEN }}
          branch: ingest/airtable-articles
          title: "ingest(articles): add articles from Airtable"
          body: |
            Auto-generated PR from Airtable ingestion workflow.

            - New articles ingested from Airtable
            - Tags normalized to canonical topics
            - Derived artifacts rebuilt (index.json, sitemap.xml, feeds, LLMS corpus)
            - Tests passing

            **Do not merge until CI is green and the diff is reviewed.**
          commit-message: "ingest(articles): add articles from Airtable"
          add-paths: |
            articles/*
            index.json
            sitemap.xml
            feed.xml
            feed.json
            llms.txt
            llms-full.txt
            llms-recent.txt
            README.md
            ROADMAP.md

      - name: Open incident issue on cron-write failure
        # Fires only when the write-mode cron path fails. Skipped on dry-run
        # (no archive impact) and skipped on success. Logs the run URL,
        # commit, and dry-run state so the operator can investigate without
        # parsing logs. Never echoes secret values.
        if: failure() && env.INGEST_DRY_RUN != '1'
        env:
          GH_TOKEN: ${{ secrets.ARTICLE_INGESTION_PR_TOKEN || secrets.GITHUB_TOKEN }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set +e
          gh issue create \
            --repo "${GITHUB_REPOSITORY}" \
            --title "E41 cron ingestion incident: workflow run ${{ github.run_id }} failed" \
            --body "$(cat <<EOF
          ## Cron write-mode ingestion failed

          - **Workflow run:** ${RUN_URL}
          - **Commit:** \`${GITHUB_SHA}\`
          - **Ref:** \`${GITHUB_REF}\`
          - **INGEST_DRY_RUN:** \`${INGEST_DRY_RUN}\`
          - **INGEST_MAX_RECORDS:** \`${INGEST_MAX_RECORDS}\`
          - **INGEST_MAX_CREATED:** \`${INGEST_MAX_CREATED}\`
          - **Trigger:** \`${GITHUB_EVENT_NAME}\`

          Investigate via the workflow logs at the run URL above. Confirm
          \`INGEST_DRY_RUN\` is restored to \`1\` if the failure left it in an
          inconsistent state (variable lives at repo level, not job level —
          this workflow does not flip it, but defense-in-depth checks are
          cheap).

          No secret values are recorded in this issue. Close once root cause
          is documented and any required code/workflow fix has shipped.
          EOF
          )"
