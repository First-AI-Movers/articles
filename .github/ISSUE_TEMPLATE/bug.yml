name: Bug report
description: Report a problem with the archive site, tooling, or workflows
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the bug and what you expected instead.
      placeholder: "The sitemap.xml contains a broken URL..."
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: How can we reproduce the issue?
      placeholder: |
        1. Go to ...
        2. Click on ...
        3. See error ...
    validations:
      required: false
  - type: input
    id: url
    attributes:
      label: Affected URL or page
      description: If relevant, provide the URL or file path.
      placeholder: "https://articles.firstaimovers.com/topics/ai-strategy/"
    validations:
      required: false
  - type: dropdown
    id: browser
    attributes:
      label: Browser
      description: If a visual/site bug, what browser are you using?
      options:
        - Chrome
        - Safari
        - Firefox
        - Edge
        - Other
        - Not applicable
    validations:
      required: false
  - type: checkboxes
    id: terms
    attributes:
      label: Code of Conduct
      description: By submitting this issue, you agree to follow our contribution guidelines.
      options:
        - label: I agree to follow this project's guidelines.
          required: true
